name: Build and deploy to Google Cloud Run

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  migration-preview:
    name: Preview Prisma migrations (auto-run)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: Show pending migrations and create plan artifact
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "### Prisma migrate status output" > migration-plan.txt || true
          npx prisma migrate status --schema=prisma/schema.prisma >> migration-plan.txt || true

      - name: Upload migration plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-plan
          path: migration-plan.txt

  migrate:
    name: Run Prisma migrations (requires approval)
    runs-on: ubuntu-latest
    needs: migration-preview
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: Run Prisma migrations (deploy)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

  build-and-deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Configure Docker to use gcloud auth
        run: gcloud auth configure-docker --quiet

      - name: Build and push image to GCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            gcr.io/${{ secrets.GCP_PROJECT }}/tecticalhub:latest
            gcr.io/${{ secrets.GCP_PROJECT }}/tecticalhub:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: tecticalhub
          image: gcr.io/${{ secrets.GCP_PROJECT }}/tecticalhub:${{ github.sha }}
          region: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT }}
          env_vars: |
            NODE_ENV=production
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          allow_unauthenticated: true

  smoke-test:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Curl health endpoint
        env:
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          echo "Pinging $APP_URL"
          for i in 1 2 3; do
            if curl -fsS $APP_URL/ | grep -q "<html"; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 3
          done
          echo "Smoke test failed" >&2
          exit 1
