name: Build and deploy to Google Cloud Run

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  migrate:
    name: Run Prisma migrations (requires approval)
    runs-on: ubuntu-latest
    # Use a protected environment (create an environment named 'production' in repo settings and add required reviewers)
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: Run Prisma migrations (deploy)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

  build-and-deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Configure Docker to use gcloud auth
        run: gcloud auth configure-docker --quiet

      - name: Build and push image to GCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            gcr.io/${{ secrets.GCP_PROJECT }}/tecticalhub:latest
            gcr.io/${{ secrets.GCP_PROJECT }}/tecticalhub:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: tecticalhub
          image: gcr.io/${{ secrets.GCP_PROJECT }}/tecticalhub:${{ github.sha }}
          region: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT }}
          env_vars: |
            NODE_ENV=production
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          allow_unauthenticated: true
